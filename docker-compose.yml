services:
    finance:
        image: ghcr.io/v4ldum/finance:latest
        restart: unless-stopped
        # Draining
        healthcheck:
            test: /bin/test ! -f /tmp/drain # && some other healthcheck
            interval: 5s
            retries: 1
        networks:
            - "netv6"
        environment:
            - TZ=Europe/Paris
            - HOST=0.0.0.0
            - PORT=7878
        volumes:
            - type: bind
              source: /root/finance/db/
              target: /app/db/
            - type: bind
              source: /root/finance/finance.env
              target: /app/.env
        labels:
            dozzle.enable: true
            traefik.enable: true
            traefik.http.routers.finance.tls: true
            traefik.http.routers.finance.entrypoints: websecure
            traefik.http.middlewares.api-prefix.stripprefix.prefixes: /api
            traefik.http.routers.finance.middlewares: api-prefix
            traefik.http.routers.finance.rule: Host(`finance.valdum.dev`) && PathPrefix(`/api`)
            scheduler.enable: true
            scheduler.exec.update-precious-metals.schedule: "00 12 3 * * *"
            scheduler.exec.update-precious-metals.command: "/app/update-agent"

networks:
    netv6:
        name: netv6
        external: true
